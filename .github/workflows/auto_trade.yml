name: ROK Auto Trader

on:
  schedule:
    # Every 5 minutes, Mon-Fri, 9:30 AM - 4:05 PM Eastern (13:30 - 20:05 UTC)
    - cron: '30,35,40,45,50,55 13 * * 1-5'
    - cron: '*/5 14,15,16,17,18,19 * * 1-5'
    - cron: '0,5 20 * * 1-5'
  workflow_dispatch:   # Manual trigger from GitHub Actions tab

permissions:
  contents: write   # needed to commit the trade log

jobs:
  trade:
    runs-on: ubuntu-latest
    timeout-minutes: 8

    steps:
      - name: Checkout main branch
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run trading bot
        env:
          ALPACA_KEY_ID:     ${{ secrets.ALPACA_KEY_ID }}
          ALPACA_SECRET_KEY: ${{ secrets.ALPACA_SECRET_KEY }}
        run: python rok_trader.py

      - name: Commit trade log
        run: |
          git config user.name "ROK Trader Bot"
          git config user.email "rok-trader@users.noreply.github.com"
          git add docs/trades.json
          git diff --staged --quiet || git commit -m "Trade log update — $(date -u +'%b %d %H:%M UTC')"
          git push origin HEAD:main || true
