name: ROK Intelligence Update

on:
  schedule:
    - cron: '0 * * * *'     # Every hour automatically
  workflow_dispatch:          # Manual trigger from GitHub UI

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout main branch
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate ROK report
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python generate_report.py

      - name: Commit and push updated report
        run: |
          git config user.name "ROK Intelligence Bot"
          git config user.email "rok-bot@users.noreply.github.com"
          git add docs/
          git diff --staged --quiet || git commit -m "ROK update — $(date -u '+%B %d %Y %H:%M UTC')"
          git push origin HEAD:main
