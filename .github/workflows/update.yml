name: ROK Intelligence Update

on:
  schedule:
    - cron: '*/15 * * * *'   # Every 15 minutes
  workflow_dispatch:          # Manual trigger from GitHub UI

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 12

    steps:
      - name: Checkout main branch
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate ROK intelligence report
        continue-on-error: true   # never let a crash block the commit step
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python generate_report.py

      - name: Commit and push intel data
        run: |
          git config user.name "ROK Intelligence Bot"
          git config user.email "rok-bot@users.noreply.github.com"
          git add docs/intel_report.json docs/history.json docs/prices.json
          git diff --staged --quiet || git commit -m "Intel update — $(date -u +'%b %d %H:%M UTC')"
          git pull --rebase origin main || true
          git push origin HEAD:main || true
